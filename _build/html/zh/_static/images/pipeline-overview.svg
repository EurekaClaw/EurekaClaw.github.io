<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 614" font-family="'Segoe UI',system-ui,-apple-system,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="640" height="614" fill="#ffffff"/>

  <!-- InputSpec -->
  <rect x="170" y="20" width="300" height="46" rx="8" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="320" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">InputSpec</text>
  <text x="320" y="57" text-anchor="middle" font-size="11" fill="#4a6080">conjecture · domain · paper_ids · mode</text>

  <line x1="320" y1="66" x2="320" y2="84" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MetaOrchestrator container -->
  <rect x="20" y="86" width="600" height="428" rx="10" fill="#f4f9ff" stroke="#2b7db5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="320" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b7db5">MetaOrchestrator</text>

  <!-- 1. SurveyAgent -->
  <rect x="120" y="114" width="400" height="46" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="320" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">SurveyAgent</text>
  <text x="320" y="151" text-anchor="middle" font-size="11" fill="#4a6080">arXiv · Semantic Scholar · web search → Bibliography</text>
  <line x1="320" y1="160" x2="320" y2="172" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 2. IdeationAgent -->
  <rect x="120" y="172" width="400" height="46" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="320" y="191" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">IdeationAgent</text>
  <text x="320" y="209" text-anchor="middle" font-size="11" fill="#4a6080">brainstorm 5 research directions</text>
  <line x1="320" y1="218" x2="320" y2="230" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 3. Direction Gate -->
  <rect x="120" y="230" width="400" height="46" rx="6" fill="#fff3cd" stroke="#e6a800" stroke-width="1.5"/>
  <text x="320" y="249" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5000">Direction Gate</text>
  <text x="320" y="267" text-anchor="middle" font-size="11" fill="#7a5000">diverge → converge → selected_direction</text>
  <line x1="320" y1="276" x2="320" y2="288" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 4. TheoryAgent -->
  <rect x="120" y="288" width="400" height="46" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="320" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">TheoryAgent</text>
  <text x="320" y="325" text-anchor="middle" font-size="11" fill="#4a6080">7-stage proof pipeline → TheoryState (proven lemmas)</text>
  <line x1="320" y1="334" x2="320" y2="346" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 5. Theory Review Gate -->
  <rect x="120" y="346" width="400" height="46" rx="6" fill="#fff3cd" stroke="#e6a800" stroke-width="1.5"/>
  <text x="320" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5000">Theory Review Gate</text>
  <text x="320" y="383" text-anchor="middle" font-size="11" fill="#7a5000">human review · optional re-run with feedback</text>
  <line x1="320" y1="392" x2="320" y2="404" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 6. ExperimentAgent (optional) -->
  <rect x="120" y="404" width="400" height="46" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="320" y="423" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">ExperimentAgent  (optional)</text>
  <text x="320" y="441" text-anchor="middle" font-size="11" fill="#666">numerical validation of theoretical bounds</text>
  <line x1="320" y1="450" x2="320" y2="462" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 7. WriterAgent -->
  <rect x="120" y="462" width="400" height="46" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="320" y="481" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">WriterAgent</text>
  <text x="320" y="499" text-anchor="middle" font-size="11" fill="#4a6080">LaTeX paper generation → paper.tex · paper.pdf</text>

  <!-- MetaOrchestrator container bottom = 86+428 = 514 -->
  <!-- Branch to two outputs -->
  <line x1="320" y1="514" x2="320" y2="532" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="155" y1="532" x2="485" y2="532" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="155" y1="532" x2="155" y2="550" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="485" y1="532" x2="485" y2="550" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ContinualLearningLoop -->
  <rect x="20" y="550" width="270" height="46" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="155" y="569" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a0000">ContinualLearningLoop</text>
  <text x="155" y="587" text-anchor="middle" font-size="11" fill="#7a0000">distill skills · update memory</text>

  <!-- ResearchOutput -->
  <rect x="350" y="550" width="270" height="46" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.5"/>
  <text x="485" y="569" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">ResearchOutput</text>
  <text x="485" y="587" text-anchor="middle" font-size="11" fill="#14532d">results/ · .tex · .pdf · .bib · .json</text>
</svg>
