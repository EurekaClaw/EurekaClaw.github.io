<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI',system-ui,-apple-system,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 6" fill="#4a5568"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 6" fill="#28a745"/>
    </marker>
  </defs>

  <rect width="700" height="420" fill="#ffffff"/>

  <text x="350" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3055">LaTeX Compilation Pipeline</text>

  <!-- WriterAgent.execute() -->
  <rect x="186" y="32" width="328" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="350" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">WriterAgent.execute()</text>
  <text x="350" y="67" text-anchor="middle" font-size="10" fill="#4a6080">fetch ResearchBrief · Bibliography · TheoryState from KnowledgeBus</text>
  <line x1="350" y1="76" x2="350" y2="88" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Two-pass proof injection -->
  <rect x="186" y="88" width="328" height="54" rx="6" fill="#e8d8ff" stroke="#6a3fbf" stroke-width="1.5"/>
  <text x="350" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b1f6b">Two-Pass Proof Injection</text>
  <text x="350" y="123" text-anchor="middle" font-size="10" fill="#5a3095">Pass 1: replace %%PROOF:id%% placeholders</text>
  <text x="350" y="136" text-anchor="middle" font-size="10" fill="#5a3095">Pass 2: inject any proofs the LLM omitted</text>
  <line x1="350" y1="142" x2="350" y2="154" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- _extract_latex() -->
  <rect x="186" y="154" width="328" height="76" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="350" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">_extract_latex()</text>
  <text x="350" y="187" text-anchor="middle" font-size="10" fill="#4a6080">strip preamble · normalize envs · fix syntax</text>
  <text x="196" y="202" font-size="9" fill="#555">  strip \begin{thebibliography} · fix \citet→\cite · fix [lemma_id]→\ref{}</text>
  <text x="196" y="216" font-size="9" fill="#555">  normalize \begin{proof} · remove orphan \end{} · strip tikzpicture</text>
  <line x1="350" y1="230" x2="350" y2="242" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Assemble paper.tex -->
  <rect x="186" y="242" width="328" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="350" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">LATEX_PREAMBLE + body + LATEX_END</text>
  <text x="350" y="277" text-anchor="middle" font-size="10" fill="#4a6080">EurekaTemplate · smile.sty · thebibliography</text>
  <line x1="350" y1="286" x2="350" y2="298" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- save_artifacts() -->
  <rect x="130" y="298" width="440" height="76" rx="6" fill="#f4f9ff" stroke="#2b7db5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b7db5">save_artifacts()</text>
  <text x="140" y="332" font-size="10" fill="#4a6080">  1. write references.bib   (before compile)</text>
  <text x="140" y="346" font-size="10" fill="#4a6080">  2. _fix_missing_citations()  remove \cite{} with no .bib entry</text>
  <text x="140" y="360" font-size="10" fill="#4a6080">  3. pdflatex pass 1 (generate .aux)  →  bibtex  →  pdflatex ×2</text>
  <line x1="350" y1="374" x2="350" y2="386" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Output -->
  <rect x="186" y="386" width="328" height="22" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.5"/>
  <text x="350" y="402" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">paper.tex · paper.pdf · references.bib</text>
</svg>
