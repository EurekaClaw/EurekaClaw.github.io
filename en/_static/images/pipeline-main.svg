<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" font-family="'Segoe UI',system-ui,-apple-system,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 6" fill="#4a5568"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 6" fill="#28a745"/>
    </marker>
  </defs>

  <rect width="820" height="700" fill="#ffffff"/>

  <!-- Column headers -->
  <text x="193" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b7db5">AGENTS / GATES</text>
  <text x="620" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#28a745">ARTIFACTS (KnowledgeBus)</text>

  <!-- InputSpec -->
  <rect x="30" y="24" width="326" height="40" rx="7" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="193" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">InputSpec</text>
  <text x="193" y="56" text-anchor="middle" font-size="10" fill="#4a6080">conjecture · domain · paper_ids · mode</text>

  <line x1="193" y1="64" x2="193" y2="78" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MetaOrchestrator container -->
  <rect x="14" y="80" width="358" height="516" rx="10" fill="#f4f9ff" stroke="#2b7db5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="193" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b7db5">MetaOrchestrator</text>

  <!-- Helper macro: each agent row y, agent label, sub-label, artifact label -->

  <!-- 1. SurveyAgent y=106 -->
  <rect x="30" y="106" width="326" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="193" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">SurveyAgent</text>
  <text x="193" y="141" text-anchor="middle" font-size="10" fill="#4a6080">arXiv · Semantic Scholar · web search</text>
  <!-- artifact arrow -->
  <line x1="356" y1="128" x2="420" y2="128" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="106" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Bibliography · ResearchBrief</text>
  <text x="610" y="141" text-anchor="middle" font-size="10" fill="#3a7d56">papers[] · open_problems · key_objects</text>

  <line x1="193" y1="150" x2="193" y2="162" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 2. IdeationAgent y=162 -->
  <rect x="30" y="162" width="326" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="193" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">IdeationAgent</text>
  <text x="193" y="197" text-anchor="middle" font-size="10" fill="#4a6080">synthesise survey → generate hypotheses</text>
  <line x1="356" y1="184" x2="420" y2="184" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="162" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">ResearchDirection × 5</text>
  <text x="610" y="197" text-anchor="middle" font-size="10" fill="#3a7d56">novelty · soundness · transformative scores</text>

  <line x1="193" y1="206" x2="193" y2="218" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 3. Direction Gate y=218 -->
  <rect x="30" y="218" width="326" height="44" rx="6" fill="#fff3cd" stroke="#e6a800" stroke-width="1.5"/>
  <text x="193" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5000">Direction Gate</text>
  <text x="193" y="253" text-anchor="middle" font-size="10" fill="#7a5000">DivergentConvergentPlanner · human fallback</text>
  <line x1="356" y1="240" x2="420" y2="240" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="218" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="236" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">selected_direction</text>
  <text x="610" y="253" text-anchor="middle" font-size="10" fill="#3a7d56">composite_score · title · hypothesis</text>

  <line x1="193" y1="262" x2="193" y2="274" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 4. TheoryAgent y=274 -->
  <rect x="30" y="274" width="326" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="193" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">TheoryAgent</text>
  <text x="193" y="309" text-anchor="middle" font-size="10" fill="#4a6080">7-stage bottom-up proof pipeline</text>
  <line x1="356" y1="296" x2="420" y2="296" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="274" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">TheoryState</text>
  <text x="610" y="309" text-anchor="middle" font-size="10" fill="#3a7d56">proven_lemmas · formal_statement · status</text>

  <line x1="193" y1="318" x2="193" y2="330" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 5. Theory Review Gate y=330 -->
  <rect x="30" y="330" width="326" height="44" rx="6" fill="#fff3cd" stroke="#e6a800" stroke-width="1.5"/>
  <text x="193" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5000">Theory Review Gate</text>
  <text x="193" y="365" text-anchor="middle" font-size="10" fill="#7a5000">lemma list · user approval · optional re-run</text>
  <line x1="356" y1="352" x2="420" y2="352" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="330" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">approved TheoryState</text>
  <text x="610" y="365" text-anchor="middle" font-size="10" fill="#3a7d56">or revised after user feedback injection</text>

  <line x1="193" y1="374" x2="193" y2="386" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 6. ExperimentAgent y=386 (optional) -->
  <rect x="30" y="386" width="326" height="44" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="193" y="404" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">ExperimentAgent  (optional)</text>
  <text x="193" y="421" text-anchor="middle" font-size="10" fill="#666">numerical validation · EXPERIMENT_MODE</text>
  <line x1="356" y1="408" x2="420" y2="408" stroke="#6c757d" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <rect x="420" y="386" width="380" height="44" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="610" y="404" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">ExperimentResult</text>
  <text x="610" y="421" text-anchor="middle" font-size="10" fill="#666">bounds[] · numerical_results · plots</text>

  <line x1="193" y1="430" x2="193" y2="442" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 7. WriterAgent y=442 -->
  <rect x="30" y="442" width="326" height="44" rx="6" fill="#dbeeff" stroke="#2b7db5" stroke-width="1.5"/>
  <text x="193" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3055">WriterAgent</text>
  <text x="193" y="477" text-anchor="middle" font-size="10" fill="#4a6080">LaTeX paper generation · pdflatex compilation</text>
  <line x1="356" y1="464" x2="420" y2="464" stroke="#28a745" stroke-width="1.2" marker-end="url(#ag)"/>
  <rect x="420" y="442" width="380" height="44" rx="6" fill="#d4f5e2" stroke="#28a745" stroke-width="1.2"/>
  <text x="610" y="460" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">paper.tex · paper.pdf · references.bib</text>
  <text x="610" y="477" text-anchor="middle" font-size="10" fill="#3a7d56">EurekaTemplate LaTeX · thebibliography</text>

  <!-- ContinualLearningLoop inside container -->
  <rect x="30" y="506" width="326" height="44" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="193" y="524" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a0000">ContinualLearningLoop</text>
  <text x="193" y="541" text-anchor="middle" font-size="10" fill="#7a0000">post_run() · distill skills · extract memory</text>
  <line x1="356" y1="528" x2="420" y2="528" stroke="#c62828" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="420" y="506" width="380" height="44" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2"/>
  <text x="610" y="524" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a0000">new skill .md files · memory entries</text>
  <text x="610" y="541" text-anchor="middle" font-size="10" fill="#7a0000">~/.eurekaclaw/skills/ · sessions/</text>

  <!-- Arrow from bottom of MetaOrchestrator container to ResearchOutput -->
  <!-- container bottom = 80+516 = 596 -->
  <line x1="193" y1="596" x2="193" y2="618" stroke="#4a5568" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ResearchOutput -->
  <rect x="14" y="618" width="358" height="56" rx="8" fill="#d4f5e2" stroke="#28a745" stroke-width="2"/>
  <text x="193" y="638" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">ResearchOutput</text>
  <text x="193" y="654" text-anchor="middle" font-size="10" fill="#3a7d56">results/&lt;session_id&gt;/</text>
  <text x="193" y="667" text-anchor="middle" font-size="10" fill="#3a7d56">paper.tex · paper.pdf · references.bib · theory_state.json · experiment_result.json</text>
</svg>
